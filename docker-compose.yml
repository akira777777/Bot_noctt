# =============================================================================
# Bot_noct - Docker Compose Configuration
# Local development and production orchestration
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Telegram Bot with Web Server
  # ---------------------------------------------------------------------------
  bot:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: bot_noct
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - BOT_TOKEN=${BOT_TOKEN}
      - ADMIN_ID=${ADMIN_ID}
      - PORT=3000
      - DB_PATH=/app/data/bot.sqlite
      - WEBAPP_URL=${WEBAPP_URL:-http://localhost:3000}
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      - RENDER_EXTERNAL_URL=${RENDER_EXTERNAL_URL:-}
    volumes:
      - bot_data:/app/data
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3000/healthz",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - bot_network

  # ---------------------------------------------------------------------------
  # Development Mode (with hot reload)
  # ---------------------------------------------------------------------------
  bot-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: bot_noct_dev
    restart: no
    ports:
      - "${PORT:-3000}:3000"
      - "9229:9229" # Node.js debugger
    environment:
      - NODE_ENV=development
      - BOT_TOKEN=${BOT_TOKEN}
      - ADMIN_ID=${ADMIN_ID}
      - PORT=3000
      - DB_PATH=/app/data/bot.sqlite
      - WEBAPP_URL=http://localhost:5173
      - CORS_ORIGIN=http://localhost:5173
    volumes:
      - ./src:/app/src:ro
      - ./webapp/src:/app/webapp/src:ro
      - ./index.js:/app/index.js:ro
      - bot_data:/app/data
    command: node --watch --inspect=0.0.0.0:9229 index.js
    networks:
      - bot_network

  # ---------------------------------------------------------------------------
  # Webapp (React + Vite dev server)
  # ---------------------------------------------------------------------------
  webapp:
    build:
      context: .
      dockerfile: Dockerfile.webapp
    container_name: bot_noct_webapp
    restart: no
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://bot:3000
    volumes:
      - ./webapp:/app:ro
      - webapp_node_modules:/app/node_modules
    command: npm run dev:web -- --host 0.0.0.0
    networks:
      - bot_network
    depends_on:
      - bot

  # ---------------------------------------------------------------------------
  # Render MCP Server (Go)
  # ---------------------------------------------------------------------------
  mcp-server:
    build:
      context: ./render-mcp-server
      dockerfile: Dockerfile
    container_name: bot_noct_mcp
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - RENDER_API_TOKEN=${RENDER_API_TOKEN:-}
      - RENDER_DEPLOY_HOOK_URL=${RENDER_DEPLOY_HOOK_URL:-}
    networks:
      - bot_network

# =============================================================================
# Volumes - persistent data
# =============================================================================
volumes:
  bot_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data
  webapp_node_modules:
    driver: local

# =============================================================================
# Networks
# =============================================================================
networks:
  bot_network:
    driver: bridge
    name: bot_noct_network
