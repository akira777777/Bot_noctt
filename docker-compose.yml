# =============================================================================
# Bot_noct - Docker Compose Configuration
# Local development and production orchestration
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Redis - Cache and Queue Backend
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: bot_noct_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
    networks:
      - bot_network

  # ---------------------------------------------------------------------------
  # Telegram Bot with Web Server
  # ---------------------------------------------------------------------------
  bot:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: bot_noct
    restart: unless-stopped
    profiles: ["prod"]
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - BOT_TOKEN=${BOT_TOKEN}
      - ADMIN_ID=${ADMIN_ID}
      - PORT=3000
      - DB_PATH=/app/data/bot.sqlite
      - WEB_APP_URL=${WEB_APP_URL:-http://localhost:3000}
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      - RENDER_EXTERNAL_URL=${RENDER_EXTERNAL_URL:-}
      # Redis Configuration
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - REDIS_DB=0
      # Cache Configuration
      - CACHE_ENABLED=${CACHE_ENABLED:-true}
      - CACHE_TTL_SESSION=3600
      - CACHE_TTL_CATALOG=300
      - CACHE_TTL_STATS=60
      # Queue Configuration
      - QUEUE_ENABLED=${QUEUE_ENABLED:-true}
      # Logging
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_FORMAT=${LOG_FORMAT:-json}
    volumes:
      - bot_data:/app/data
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3000/healthz",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M
    networks:
      - bot_network

  # ---------------------------------------------------------------------------
  # Development Mode (with hot reload)
  # ---------------------------------------------------------------------------
  bot-dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bot_noct_dev
    restart: no
    profiles: ["dev"]
    ports:
      - "${DEV_PORT:-3001}:3000"
      - "9229:9229" # Node.js debugger
    environment:
      - NODE_ENV=development
      - BOT_TOKEN=${BOT_TOKEN}
      - ADMIN_ID=${ADMIN_ID}
      - PORT=3000
      - DB_PATH=/app/data/bot.sqlite
      - WEB_APP_URL=http://localhost:5173
      - CORS_ORIGIN=http://localhost:5173
      # Redis Configuration
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      # Logging
      - LOG_LEVEL=debug
      - LOG_FORMAT=pretty
    volumes:
      - ./src:/app/src:ro
      - ./index.js:/app/index.js:ro
      - bot_data:/app/data
    command: node --watch --inspect=0.0.0.0:9229 index.js
    depends_on:
      redis:
        condition: service_started
    networks:
      - bot_network

  # ---------------------------------------------------------------------------
  # Web dashboard (Next.js dev server)
  # ---------------------------------------------------------------------------
  web:
    image: node:20-alpine
    container_name: bot_noct_web
    restart: no
    profiles: ["dev"]
    ports:
      - "5173:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - API_URL=http://bot-dev:3000
      - API_SECRET=${API_SECRET:-}
    volumes:
      - ./web:/app/web:ro
      - web_node_modules:/app/web/node_modules
    working_dir: /app
    command: sh -c "cd /app/web && npm ci && npm run dev -- --hostname 0.0.0.0"
    networks:
      - bot_network
    depends_on:
      - bot-dev

  # ---------------------------------------------------------------------------
  # Render MCP Server (Go)
  # ---------------------------------------------------------------------------
  mcp-server:
    build:
      context: ./render-mcp-server
      dockerfile: Dockerfile
    container_name: bot_noct_mcp
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - RENDER_API_TOKEN=${RENDER_API_TOKEN:-}
      - RENDER_DEPLOY_HOOK_URL=${RENDER_DEPLOY_HOOK_URL:-}
    networks:
      - bot_network

  # ---------------------------------------------------------------------------
  # Adminer - Database Management UI (optional)
  # ---------------------------------------------------------------------------
  adminer:
    image: adminer:latest
    container_name: bot_noct_adminer
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      - ADMINER_DESIGN=gixie
    networks:
      - bot_network
    profiles:
      - tools

# =============================================================================
# Volumes - persistent data
# =============================================================================
volumes:
  bot_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data
  redis_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data/redis
  web_node_modules:
    driver: local

# =============================================================================
# Networks
# =============================================================================
networks:
  bot_network:
    driver: bridge
    name: bot_noct_network
