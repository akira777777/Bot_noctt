# Production override for Bot_noct
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.production.yml --profile prod up -d bot redis

services:
  bot:
    build:
      dockerfile: Dockerfile
      target: production
    container_name: bot-noct
    environment:
      NODE_ENV: production
      PORT: ${PORT:-3000}
      TELEGRAM_DELIVERY_MODE: ${TELEGRAM_DELIVERY_MODE:-webhook}
      WEBHOOK_DOMAIN: ${WEBHOOK_DOMAIN:-}
      BOT_TOKEN: ${BOT_TOKEN}
      ADMIN_ID: ${ADMIN_ID}
      API_SECRET: ${API_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN:-}
      DB_PATH: /app/data/bot.sqlite
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: ${REDIS_DB:-0}
    volumes:
      - bot_data:/app/data
      - ./logs:/app/logs
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3000/healthz",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    container_name: bot-redis
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
