name: CI/CD

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

env:
  NODE_VERSION: "20"
  BOT_TOKEN: "000000:ci-token"
  ADMIN_ID: "1"
  PORT: "3001"
  NODE_ENV: test

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Install web dependencies
        run: npm ci --prefix web

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Build web app
        run: npm run build:web

      - name: Run API smoke test
        run: npm run smoke:api

  docker-image:
    name: Build And Push Docker Image
    runs-on: ubuntu-latest
    needs: [quality]
    if: >
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      secrets.DOCKERHUB_USERNAME != '' &&
      secrets.DOCKERHUB_TOKEN != ''
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/bot-noct
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: [docker-image]
    if: >
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      secrets.SSH_HOST != '' &&
      secrets.SSH_USERNAME != '' &&
      secrets.SSH_KEY != ''
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /app/bot-noct
            git pull origin main
            docker compose -f docker-compose.yml -f docker-compose.production.yml --profile prod pull
            docker compose -f docker-compose.yml -f docker-compose.production.yml --profile prod up -d bot
            docker image prune -f
