services:
  - type: web
    name: bot-noct
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_ID
        sync: false
      - key: DB_PATH
        value: /opt/render/project/src/data/bot.sqlite
      - key: PORT
        value: 10000
      - key: API_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: WEBHOOK_DOMAIN
        fromService:
          type: web
          name: bot-noct
          property: host
    disks:
      - name: sqlite-data
        mountPath: /opt/render/project/src/data
        sizeGB: 1
